services:
  mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs", "--bind_ip_all", "--noauth"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 3s
      timeout: 5s
      retries: 10

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      mongosh --host mongo --eval '
        try { rs.initiate({ _id: "rs", members: [{ _id: 0, host: "localhost:27017" }] }); }
        catch(e) { if (e.codeName !== "AlreadyInitialized") throw e; }
      '

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
